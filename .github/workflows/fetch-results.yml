name: Fetch Race Results

on:
  schedule:
    # Run every night at 2am UTC (10pm ET)
    - cron: '0 2 * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Fetch results
        run: python3 scripts/fetch_results.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/race_results_live.json
          git diff --cached --quiet || git commit -m "chore: update race results from BikeReg"

      - name: Push
        run: git push
