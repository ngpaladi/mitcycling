# FAQ data — sourced from cycling.mit.edu/faq

- category: "Getting Started"
  questions:
    - q: "Can I ride with the team?"
      a: >
        Of course! Rides are posted to our mailing list year-round. Let the ride leader
        know you're coming, or just show up. Don't forget your helmet! If you'd like to
        join an official club event such as a race, follow the guidelines on the
        [Join](/join/) page.

    - q: "Where does the team ride?"
      a: >
        Club rides generally start at the MIT Student Center and head toward Concord or
        Dover. See the [Routes](/routes/) page for popular options. Many members also
        post their rides on our Strava club.

    - q: "What should I bring on a ride?"
      a: >
        Always carry food, water, tools to repair a flat (pump, spare tube, tire levers),
        ID, and your medical insurance card — and of course a helmet. Useful extras:
        extra clothing, a multi-tool, cash, your phone, and a map.

    - q: "Do I need my own bike?"
      a: >
        The club has loaner bikes available. If you're unsure whether your bike is suitable
        for a particular ride or event, reach out to the officers — we're happy to advise.

    - q: "Is the club open to grad students and staff?"
      a: >
        Yes. MIT Club Sports is open to MIT affiliates including graduate students,
        postdocs, and staff. Race cost coverage differs by membership tier — see the
        [Join](/join/) page for details.

- category: "Membership & Dues"
  questions:
    - q: "How much does membership cost?"
      a: >
        Dues range from $30 (Basic, up to 1 race weekend) to $250 (6 Race Weekends,
        aimed at graduate students). See the [Join](/join/) page for full details.
        If cost is a barrier, contact us — we never want finances to prevent someone
        from participating.

    - q: "What does membership include?"
      a: >
        Paid membership gives you discounts on team kit and equipment sponsors, racing
        privileges (club covers registration, license, transportation, and housing),
        access to coaching and training plans, and access to the MIT Cycling Balcony
        (bike tools, trainers, rollers). Basic access to sponsored deals is also included.

    - q: "How often do I have to sign waivers?"
      a: >
        To comply with MIT Club Sports policy, members sign waivers anew each year.
        The club calendar rolls over in July, so depending on when you join you may
        need to sign twice in an academic year. You'll receive email reminders if you're
        on our mailing list.

- category: "Racing"
  questions:
    - q: "What is the ECCC?"
      a: >
        The Eastern Collegiate Cycling Conference, organized by USA Cycling. MIT competes
        across road, track, cyclocross, mountain, and gravel disciplines. Race weekends
        typically run Friday evening through Sunday.

    - q: "When is the season?"
      a: >
        Road season is in spring. Track season runs from early August to late September.
        Mountain bike season is early to mid fall. Cyclocross season is late fall.
        Check the [ECCC website](https://eccc.cycling) for the current race calendar.

    - q: "Can I race with the team?"
      a: >
        Club members who are current full-time students are welcome to race with the
        team and have costs covered per the policy on the [Join](/join/) page. Members
        who are not full-time students may join race weekend logistics for jointly USAC
        and collegiate events, but do not receive the same cost coverage. Alumni and
        friends are welcome to ride in team kit but should not race under the MIT name
        when collegiate racers are present — this is particularly important for ECCC
        conference-scoring events.

    - q: "Do you have a coach?"
      a: >
        Yes, in multiple disciplines. Coaches provide training plans and fall clinics.
        Even if you're not planning to race, the fall clinics are an excellent way to
        meet other cyclists and develop riding skills. Club membership grants access to
        training plans, coached clinics, and correspondence with coaches.

- category: "Training & Rides"
  questions:
    - q: "When do you hold group rides?"
      a: >
        Group rides happen year-round, posted to the mailing list. No sign-up needed —
        just show up with a bike and a helmet.

    - q: "I want to lead a ride — what's expected?"
      a: >
        Read the team's ride guidelines and safety policies and advertise your ride
        appropriately through the mailing list. Ride leaders for paid members are expected
        to lead at least two rides during spring and fall as part of their membership
        obligations.

    - q: "What are important considerations when buying a bike?"
      a: >
        Size is the most important factor — before buying, take the bike for a test ride
        to check the fit. Other key considerations include components and your budget.
        Talk to other club members or visit our team shop partner Back in Action Bikes
        for advice.
