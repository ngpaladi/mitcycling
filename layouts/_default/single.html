{{ define "main" }}

<div class="page-header">
  <div class="container">
    <div class="page-header-label">MIT Cycling</div>
    <h1>{{ .Title }}</h1>
    {{ with .Params.description }}<p>{{ . }}</p>{{ end }}
  </div>
</div>

<section class="section">
  <div class="container container--text">
    <div class="post-body" style="max-width:100%;padding:0">
      {{ .Content }}
    </div>
  </div>
</section>

{{ end }}
